<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>表格作業</title>
    <style>
    table {
        border-collapse: collapse;
        width: 300px; 
    }

    table, th, td {
        border: 1px solid black;
    }

    th, td {
        padding: 5px;
        text-align: left;
    }

    th {
        font-weight: bold;
    }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>Name</th>
            <th>Student ID</th>
        </tr>
        <tr>
            <td>蕭筠蓁</td>
            <td>113403035</td>
        </tr>
    </table>

</body>
</html>
